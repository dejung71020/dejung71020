<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">Daejung Lee — Vibe Carving</title>
  <desc id="desc">AI-native backend and platform engineer who turns AI-assisted development into tested, deployed, observable systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#101b32"/>
      <stop offset="1" stop-color="#071b20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#65f4d2"/>
      <stop offset="0.52" stop-color="#76b9ff"/>
      <stop offset="1" stop-color="#a88bff"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#58e2c1" stop-opacity=".24"/>
      <stop offset="1" stop-color="#58e2c1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#9cc7dc" stroke-opacity=".07"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1280" height="430" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="430" rx="28" fill="url(#grid)"/>
  <circle cx="1090" cy="110" r="280" fill="url(#glow)"/>
  <path d="M0 355C260 305 360 426 650 358S1040 278 1280 335V430H0Z" fill="#3dd9b2" opacity=".035"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <circle cx="68" cy="62" r="5" fill="#65f4d2"/>
    <text x="85" y="68" fill="#b9c9d8" font-size="15" font-weight="700" letter-spacing="2">YAMON · SEOUL · AVAILABLE FOR SERIOUS SYSTEMS</text>

    <text x="62" y="156" fill="#fff" font-size="68" font-weight="850" letter-spacing="-3">VIBE</text>
    <text x="62" y="225" fill="url(#accent)" font-size="68" font-weight="850" letter-spacing="-3">CARVING</text>
    <text x="66" y="269" fill="#d3deea" font-size="20" font-weight="650">DAEJUNG LEE · AI-NATIVE BACKEND &amp; PLATFORM ENGINEER</text>
    <text x="66" y="304" fill="#8fa5b6" font-size="16">From AI-generated momentum to contracts, tests, delivery, observation, and recovery.</text>

    <g transform="translate(66 344)">
      <g fill="#101d2c" stroke="#355064">
        <rect width="104" height="38" rx="19"/><rect x="116" width="92" height="38" rx="19"/><rect x="220" width="106" height="38" rx="19"/><rect x="338" width="92" height="38" rx="19"/><rect x="442" width="104" height="38" rx="19"/>
      </g>
      <g fill="#c8d7e3" font-size="12" font-weight="750" text-anchor="middle">
        <text x="52" y="24">CONTRACT</text><text x="162" y="24">TEST</text><text x="273" y="24">DEPLOY</text><text x="384" y="24">OBSERVE</text><text x="494" y="24">RECOVER</text>
      </g>
    </g>

    <g transform="translate(790 70)" filter="url(#shadow)">
      <rect width="424" height="292" rx="24" fill="#0c1726" stroke="#335163"/>
      <text x="28" y="42" fill="#6ee8ca" font-size="12" font-weight="800" letter-spacing="2">PRODUCTION PROOF / 04</text>
      <text x="28" y="78" fill="#fff" font-size="22" font-weight="750">Working software leaves evidence.</text>
      <g transform="translate(28 108)">
        <path d="M13 22V144" stroke="#385267" stroke-width="2"/>
        <g>
          <circle cx="13" cy="16" r="8" fill="#65f4d2"/><text x="38" y="21" fill="#e7eef5" font-size="15" font-weight="700">Domain slice</text><text x="248" y="21" fill="#7890a3" font-size="12">BOUNDARY</text>
          <circle cx="13" cy="58" r="8" fill="#76b9ff"/><text x="38" y="63" fill="#e7eef5" font-size="15" font-weight="700">Executable contract</text><text x="248" y="63" fill="#7890a3" font-size="12">API + DATA</text>
          <circle cx="13" cy="100" r="8" fill="#a88bff"/><text x="38" y="105" fill="#e7eef5" font-size="15" font-weight="700">Delivery gate</text><text x="248" y="105" fill="#7890a3" font-size="12">CI + BUILD</text>
          <circle cx="13" cy="142" r="8" fill="#ffca76"/><text x="38" y="147" fill="#e7eef5" font-size="15" font-weight="700">Rollback point</text><text x="248" y="147" fill="#7890a3" font-size="12">ZERO LOSS</text>
        </g>
      </g>
      <rect x="28" y="260" width="368" height="1" fill="#2d4557"/>
      <text x="28" y="282" fill="#8097aa" font-size="11" letter-spacing="1">PROMPT → SLICE → CONTRACT → TEST → DEPLOY → CARVE</text>
    </g>
  </g>
</svg>
