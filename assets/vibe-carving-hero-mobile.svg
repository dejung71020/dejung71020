<svg xmlns="http://www.w3.org/2000/svg" width="720" height="620" viewBox="0 0 720 620" role="img" aria-labelledby="title desc">
  <title id="title">Daejung Lee — Vibe Carving</title>
  <desc id="desc">Mobile profile banner for an AI-native backend and platform engineer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset=".55" stop-color="#101b32"/><stop offset="1" stop-color="#071b20"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#65f4d2"/><stop offset=".52" stop-color="#76b9ff"/><stop offset="1" stop-color="#a88bff"/></linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#9cc7dc" stroke-opacity=".07"/></pattern>
  </defs>
  <rect width="720" height="620" rx="30" fill="url(#bg)"/>
  <rect width="720" height="620" rx="30" fill="url(#grid)"/>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <circle cx="52" cy="55" r="5" fill="#65f4d2"/>
    <text x="70" y="61" fill="#b9c9d8" font-size="14" font-weight="750" letter-spacing="2">YAMON · SEOUL</text>
    <text x="48" y="150" fill="#fff" font-size="72" font-weight="850" letter-spacing="-3">VIBE</text>
    <text x="48" y="222" fill="url(#accent)" font-size="72" font-weight="850" letter-spacing="-3">CARVING</text>
    <text x="52" y="266" fill="#d3deea" font-size="17" font-weight="700">DAEJUNG LEE</text>
    <text x="52" y="294" fill="#91a7b8" font-size="14">AI-NATIVE BACKEND &amp; PLATFORM ENGINEER</text>

    <g transform="translate(42 334)">
      <rect width="636" height="204" rx="24" fill="#0c1726" stroke="#335163"/>
      <text x="26" y="38" fill="#6ee8ca" font-size="12" font-weight="800" letter-spacing="2">PRODUCTION PROOF</text>
      <g transform="translate(26 66)">
        <g fill="#132335" stroke="#3c566a"><rect width="278" height="48" rx="14"/><rect x="292" width="292" height="48" rx="14"/><rect y="64" width="278" height="48" rx="14"/><rect x="292" y="64" width="292" height="48" rx="14"/></g>
        <g font-size="15" font-weight="750"><text x="18" y="30" fill="#65f4d2">CONTRACT</text><text x="310" y="30" fill="#76b9ff">TEST + BUILD</text><text x="18" y="94" fill="#a88bff">DELIVERY</text><text x="310" y="94" fill="#ffca76">RECOVERY</text></g>
      </g>
      <text x="26" y="184" fill="#7f96a9" font-size="11" letter-spacing="1">PROMPT → SLICE → CONTRACT → TEST → DEPLOY → CARVE</text>
    </g>
    <text x="360" y="584" text-anchor="middle" fill="#a9bac8" font-size="14">Working software leaves evidence.</text>
  </g>
</svg>
